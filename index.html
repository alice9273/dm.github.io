<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>BrawlNet DM</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0d1117;
  --bg2:#161b22;
  --bg3:#1c2128;
  --card:#1c2128;
  --border:#30363d;
  --yellow:#ffe44d;
  --orange:#ff8c00;
  --accent:#ffcc02;
  --accent2:#ff6b2b;
  --red:#ff4757;
  --green:#2ed573;
  --blue:#1e90ff;
  --text:#f0f6fc;
  --text2:#8b949e;
  --text3:#484f58;
  --r:14px;
  --font:'Nunito',sans-serif;
  --font-title:'Lilita One',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);overflow:hidden}

/* scrollbar */
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

/* ── TOAST ── */
#toast{position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-8px);
  background:var(--bg2);color:var(--text);padding:9px 18px;border-radius:20px;
  font-size:.82rem;font-weight:700;z-index:999;opacity:0;transition:all .3s;
  white-space:nowrap;border:1.5px solid var(--border);pointer-events:none}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.ok{border-color:var(--green);color:var(--green)}
#toast.err{border-color:var(--red);color:var(--red)}

/* ── AUTH ── */
#auth{display:none;position:fixed;inset:0;z-index:100;
  background:radial-gradient(ellipse at 50% 0%,#1a2535 0%,var(--bg) 70%);
  align-items:center;justify-content:center;padding:20px}
#auth.on{display:flex}
.auth-wrap{width:100%;max-width:380px}
.auth-logo{text-align:center;margin-bottom:24px}
.auth-logo-title{font-family:var(--font-title);font-size:2rem;
  background:linear-gradient(135deg,var(--yellow),var(--orange));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.auth-logo-sub{font-size:.75rem;color:var(--text2);font-weight:700;letter-spacing:3px;
  text-transform:uppercase;margin-top:2px}
.auth-box{background:var(--bg2);border:1.5px solid var(--border);border-radius:20px;padding:24px}
.auth-tabs{display:flex;border-bottom:1.5px solid var(--border);margin-bottom:18px;gap:4px}
.auth-tab{flex:1;padding:9px;border:none;background:none;font-family:var(--font);
  font-size:.88rem;font-weight:800;color:var(--text2);cursor:pointer;border-radius:8px 8px 0 0;
  border-bottom:2.5px solid transparent;transition:all .2s}
.auth-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.auth-body{display:none}.auth-body.active{display:block}
.field{margin-bottom:12px}
.field label{display:block;font-size:.72rem;font-weight:800;color:var(--text2);
  text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.inp{width:100%;background:var(--bg3);border:1.5px solid var(--border);border-radius:10px;
  padding:10px 13px;color:var(--text);font-family:var(--font);font-size:.92rem;
  font-weight:600;outline:none;transition:border .2s}
.inp:focus{border-color:var(--accent)}
.btn-main{width:100%;background:linear-gradient(135deg,var(--yellow),var(--orange));
  color:#111;border:none;border-radius:12px;padding:13px;font-family:var(--font-title);
  font-size:1.05rem;cursor:pointer;transition:all .2s;letter-spacing:.5px}
.btn-main:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(255,200,0,.3)}
.auth-err{color:var(--red);font-size:.78rem;font-weight:700;margin-top:8px;min-height:16px}

/* ── APP ── */
#app{display:none;height:100%;flex-direction:row}
#app.on{display:flex}

/* ── SIDEBAR ── */
.sidebar{width:320px;min-width:320px;background:var(--bg2);border-right:1px solid var(--border);
  display:flex;flex-direction:column;height:100%}
@media(max-width:600px){
  .sidebar{width:100%;min-width:0;position:fixed;inset:0;z-index:10;transition:transform .25s}
  .sidebar.hidden{transform:translateX(-100%)}
  .chat-area{position:fixed;inset:0;z-index:11}
}

.sidebar-top{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.sb-logo{font-family:var(--font-title);font-size:1.2rem;
  background:linear-gradient(135deg,var(--yellow),var(--orange));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;flex:1}
.my-av{width:34px;height:34px;border-radius:50%;object-fit:contain;border:2px solid var(--accent);
  background:var(--bg3);padding:2px;cursor:pointer}
.logout-btn{background:none;border:1px solid var(--border);border-radius:8px;
  padding:5px 10px;color:var(--text2);cursor:pointer;font-size:.75rem;font-weight:700;
  font-family:var(--font);transition:all .2s}
.logout-btn:hover{border-color:var(--red);color:var(--red)}

.search-wrap{padding:10px 14px;border-bottom:1px solid var(--border)}
.search-inp{width:100%;background:var(--bg3);border:1.5px solid var(--border);
  border-radius:20px;padding:8px 14px;color:var(--text);font-family:var(--font);
  font-size:.85rem;font-weight:600;outline:none;transition:border .2s}
.search-inp:focus{border-color:var(--accent)}
.search-results{background:var(--bg3);border:1.5px solid var(--border);
  border-radius:12px;margin:6px 14px 0;overflow:hidden;display:none}
.search-results.open{display:block}
.search-item{display:flex;align-items:center;gap:10px;padding:10px 12px;cursor:pointer;
  transition:background .15s;border-bottom:1px solid var(--border)}
.search-item:last-child{border-bottom:none}
.search-item:hover{background:var(--bg2)}
.sav{width:32px;height:32px;border-radius:50%;object-fit:contain;border:1.5px solid var(--border);
  background:var(--bg2);padding:2px;flex-shrink:0}
.sname{font-size:.86rem;font-weight:800}
.shandle{font-size:.72rem;color:var(--text2)}

.conv-list{flex:1;overflow-y:auto;padding:6px 0}
.conv-empty{text-align:center;padding:40px 20px;color:var(--text2)}
.conv-empty .ei{font-size:2.5rem;margin-bottom:10px}
.conv-empty p{font-size:.85rem;font-weight:700;line-height:1.6}

.conv-item{display:flex;align-items:center;gap:11px;padding:10px 16px;cursor:pointer;
  transition:background .15s;position:relative;border-left:3px solid transparent}
.conv-item:hover{background:var(--bg3)}
.conv-item.active{background:var(--bg3);border-left-color:var(--accent)}
.conv-av{width:44px;height:44px;border-radius:50%;object-fit:contain;
  border:2px solid var(--border);background:var(--bg3);padding:2px;flex-shrink:0}
.conv-info{flex:1;min-width:0}
.conv-name{font-size:.9rem;font-weight:800;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.conv-last{font-size:.75rem;color:var(--text2);overflow:hidden;text-overflow:ellipsis;
  white-space:nowrap;margin-top:2px}
.conv-meta{text-align:right;flex-shrink:0}
.conv-time{font-size:.68rem;color:var(--text3);margin-bottom:4px}
.conv-badge{background:linear-gradient(135deg,var(--yellow),var(--orange));
  color:#111;font-size:.68rem;font-weight:900;border-radius:10px;
  padding:2px 7px;min-width:18px;text-align:center;display:none}
.conv-badge.show{display:block}

/* ── CHAT AREA ── */
.chat-area{flex:1;display:flex;flex-direction:column;height:100%;background:var(--bg);min-width:0}

.chat-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  color:var(--text2);padding:40px}
.chat-empty .big-icon{font-size:4rem;margin-bottom:16px;
  filter:drop-shadow(0 0 20px rgba(255,204,2,.3))}
.chat-empty h2{font-family:var(--font-title);font-size:1.4rem;color:var(--accent);margin-bottom:8px}
.chat-empty p{font-size:.88rem;text-align:center;line-height:1.6;font-weight:600}

.chat-header{height:58px;background:rgba(13,17,23,.95);backdrop-filter:blur(10px);
  border-bottom:1px solid var(--border);display:flex;align-items:center;
  gap:12px;padding:0 16px;flex-shrink:0}
.back-btn{background:none;border:none;color:var(--text2);cursor:pointer;
  font-size:1.1rem;padding:4px 8px;border-radius:8px;transition:all .2s;
  display:none}
@media(max-width:600px){.back-btn{display:block}}
.back-btn:hover{color:var(--text);background:var(--bg2)}
.ch-av{width:36px;height:36px;border-radius:50%;object-fit:contain;
  border:2px solid var(--accent);background:var(--bg3);padding:2px}
.ch-info{flex:1;min-width:0}
.ch-name{font-weight:800;font-size:.92rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ch-handle{font-size:.72rem;color:var(--text2)}
.online-dot{width:8px;height:8px;border-radius:50%;background:var(--green);
  box-shadow:0 0 6px var(--green);flex-shrink:0}

.messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:6px}

/* ── MESSAGE BUBBLES ── */
.msg-group{display:flex;flex-direction:column;gap:3px;margin-bottom:6px}
.msg-group.mine{align-items:flex-end}
.msg-group.theirs{align-items:flex-start}
.msg-row{display:flex;align-items:flex-end;gap:8px}
.msg-group.mine .msg-row{flex-direction:row-reverse}
.msg-av-sm{width:28px;height:28px;border-radius:50%;object-fit:contain;
  border:1.5px solid var(--border);background:var(--bg3);padding:1px;
  flex-shrink:0;opacity:0;transition:opacity .2s}
.msg-group .msg-row:last-child .msg-av-sm{opacity:1}
.bubble{max-width:72%;padding:9px 13px;font-size:.88rem;font-weight:600;
  line-height:1.45;word-break:break-word;position:relative}
.msg-group.mine .bubble{
  background:linear-gradient(135deg,var(--yellow),var(--orange));
  color:#111;border-radius:18px 18px 4px 18px}
.msg-group.theirs .bubble{
  background:var(--bg2);color:var(--text);
  border:1.5px solid var(--border);border-radius:18px 18px 18px 4px}
.bubble-img{max-width:240px;border-radius:12px;display:block;margin-bottom:4px;cursor:pointer}
.msg-time{font-size:.62rem;color:var(--text3);margin-top:2px;padding:0 4px}
.msg-group.mine .msg-time{text-align:right;color:rgba(255,200,0,.5)}

/* read receipt */
.read-tick{font-size:.65rem;color:var(--accent);margin-top:2px;text-align:right;padding-right:2px}

/* date separator */
.date-sep{text-align:center;margin:10px 0;font-size:.72rem;font-weight:700;color:var(--text3);
  display:flex;align-items:center;gap:10px}
.date-sep::before,.date-sep::after{content:'';flex:1;height:1px;background:var(--border)}

/* typing indicator */
.typing-ind{display:none;padding:6px 16px}
.typing-ind.show{display:flex;align-items:center;gap:8px}
.typing-dots{display:flex;gap:4px;background:var(--bg2);border:1.5px solid var(--border);
  padding:10px 14px;border-radius:18px 18px 18px 4px}
.typing-dots span{width:6px;height:6px;border-radius:50%;background:var(--text3);
  animation:tdot 1.2s infinite}
.typing-dots span:nth-child(2){animation-delay:.2s}
.typing-dots span:nth-child(3){animation-delay:.4s}
@keyframes tdot{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}

/* ── INPUT BAR ── */
.input-bar{background:rgba(13,17,23,.95);backdrop-filter:blur(10px);
  border-top:1px solid var(--border);padding:10px 14px;
  display:flex;align-items:flex-end;gap:8px;flex-shrink:0}
.attach-btn{background:var(--bg2);border:1.5px solid var(--border);border-radius:10px;
  padding:9px 11px;color:var(--text2);cursor:pointer;font-size:1rem;
  transition:all .2s;flex-shrink:0;line-height:1}
.attach-btn:hover{border-color:var(--accent);color:var(--accent)}
.msg-inp-wrap{flex:1;background:var(--bg2);border:1.5px solid var(--border);
  border-radius:20px;display:flex;align-items:flex-end;overflow:hidden;transition:border .2s}
.msg-inp-wrap:focus-within{border-color:var(--accent)}
.msg-inp{flex:1;background:none;border:none;padding:10px 14px;color:var(--text);
  font-family:var(--font);font-size:.9rem;font-weight:600;outline:none;
  resize:none;max-height:120px;min-height:38px;line-height:1.4}
.send-btn{background:linear-gradient(135deg,var(--yellow),var(--orange));
  color:#111;border:none;border-radius:0 18px 18px 0;
  padding:0 16px;cursor:pointer;font-size:1.1rem;
  transition:all .2s;align-self:stretch;min-width:44px}
.send-btn:hover{opacity:.9}
.send-btn:disabled{opacity:.4;cursor:not-allowed}

/* ── IMG PREVIEW ── */
.img-preview-bar{background:var(--bg2);border-top:1px solid var(--border);
  padding:8px 14px;display:none;align-items:center;gap:10px}
.img-preview-bar.show{display:flex}
.preview-thumb{width:48px;height:48px;border-radius:8px;object-fit:cover;border:1.5px solid var(--border)}
.preview-name{flex:1;font-size:.78rem;color:var(--text2);font-weight:700;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.preview-rm{background:rgba(255,71,87,.15);border:1px solid rgba(255,71,87,.25);
  color:var(--red);border-radius:8px;padding:4px 10px;cursor:pointer;
  font-size:.78rem;font-weight:800;border-style:solid;transition:all .2s}
.preview-rm:hover{background:rgba(255,71,87,.3)}

/* ── FULL IMG MODAL ── */
.img-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);
  z-index:500;align-items:center;justify-content:center;cursor:zoom-out}
.img-modal.open{display:flex}
.img-modal img{max-width:90vw;max-height:90vh;border-radius:12px;object-fit:contain}

/* ── SKELETON ── */
.skel{background:linear-gradient(90deg,var(--bg2) 25%,var(--bg3) 50%,var(--bg2) 75%);
  background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:8px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
</style>
</head>
<body>

<div id="toast"></div>

<!-- AUTH -->
<div id="auth">
  <div class="auth-wrap">
    <div class="auth-logo">
      <div class="auth-logo-title">⚡ BrawlNet DM</div>
      <div class="auth-logo-sub">Messagerie privée</div>
    </div>
    <div class="auth-box">
      <div class="auth-tabs">
        <button class="auth-tab active" id="tab-login">Connexion</button>
        <button class="auth-tab" id="tab-signup">Inscription</button>
      </div>
      <div class="auth-body active" id="form-login">
        <div class="field"><label>Pseudo</label>
          <input class="inp" id="login-name" placeholder="ton_pseudo" maxlength="20"/></div>
        <div class="field"><label>Mot de passe</label>
          <input class="inp" id="login-pwd" type="password" placeholder="••••••"/></div>
        <button class="btn-main" id="btn-login">Se connecter</button>
        <div class="auth-err" id="login-err"></div>
      </div>
      <div class="auth-body" id="form-signup">
        <div class="field"><label>Pseudo</label>
          <input class="inp" id="su-name" placeholder="ton_pseudo" maxlength="20"/></div>
        <div class="field"><label>Nom affiché</label>
          <input class="inp" id="su-fullname" placeholder="Ton nom" maxlength="40"/></div>
        <div class="field"><label>Mot de passe</label>
          <input class="inp" id="su-pwd" type="password" placeholder="••••••"/></div>
        <button class="btn-main" id="btn-signup">Créer le compte</button>
        <div class="auth-err" id="signup-err"></div>
      </div>
    </div>
  </div>
</div>

<!-- FULLSCREEN IMG -->
<div class="img-modal" id="img-modal">
  <img id="img-modal-src" src="" alt=""/>
</div>

<!-- APP -->
<div id="app">
  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-top">
      <span class="sb-logo">⚡ DM</span>
      <img class="my-av" id="my-av" src="" alt=""/>
      <span id="my-name" style="font-size:.82rem;font-weight:800;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></span>
      <button class="logout-btn" id="logout-btn">Quitter</button>
    </div>
    <div class="search-wrap">
      <input class="search-inp" id="search-inp" placeholder="🔍 Chercher un brawler..."/>
      <div class="search-results" id="search-results"></div>
    </div>
    <div class="conv-list" id="conv-list">
      <div class="conv-empty">
        <div class="ei">💬</div>
        <p>Chargement des<br>conversations...</p>
      </div>
    </div>
  </div>

  <!-- CHAT AREA -->
  <div class="chat-area" id="chat-area">
    <div class="chat-empty" id="chat-empty">
      <div class="big-icon">⚡</div>
      <h2>Tes DMs Brawl Stars</h2>
      <p>Recherche un brawler par pseudo<br>et envoie un message privé !</p>
    </div>
    <div id="chat-view" style="display:none;flex-direction:column;height:100%">
      <div class="chat-header">
        <button class="back-btn" id="back-btn">←</button>
        <img class="ch-av" id="ch-av" src="" alt=""/>
        <div class="ch-info">
          <div class="ch-name" id="ch-name"></div>
          <div class="ch-handle" id="ch-handle"></div>
        </div>
        <div class="online-dot" id="online-dot" style="display:none"></div>
      </div>
      <div class="messages" id="messages"></div>
      <div class="typing-ind" id="typing-ind">
        <img class="sav" id="typing-av" src="" alt="" style="width:24px;height:24px"/>
        <div class="typing-dots"><span></span><span></span><span></span></div>
      </div>
      <div class="img-preview-bar" id="img-preview-bar">
        <img class="preview-thumb" id="preview-thumb" src="" alt=""/>
        <span class="preview-name" id="preview-name"></span>
        <button class="preview-rm" id="preview-rm">✕ Retirer</button>
      </div>
      <div class="input-bar">
        <button class="attach-btn" id="attach-btn" title="Image">📎</button>
        <div class="msg-inp-wrap">
          <textarea class="msg-inp" id="msg-inp" placeholder="Message..." rows="1" maxlength="1000"></textarea>
          <button class="send-btn" id="send-btn">➤</button>
        </div>
      </div>
    </div>
  </div>
</div>

<input type="file" id="file-inp" accept="image/*" style="display:none"/>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getDatabase,ref,set,get,onValue,update,remove,off,push,serverTimestamp,onDisconnect}
  from"https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const db=getDatabase(initializeApp({
  apiKey:"AIzaSyD5iHeUwIGlQwK-WPbhAkj0Wg5rbjc9-rs",
  authDomain:"hack-terminal-game-d9b04.firebaseapp.com",
  databaseURL:"https://hack-terminal-game-d9b04-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:"hack-terminal-game-d9b04",
  storageBucket:"hack-terminal-game-d9b04.firebasestorage.app",
  messagingSenderId:"895717198964",
  appId:"1:895717198964:web:9590c7a61f57bccba59521"
},'brawlnet_dm'));

// Chemins Firebase séparés du réseau social
// bwn/  → réseau social (spark-social.html)
// bwndm/ → cette messagerie

const DB = 'bwndm';
const $=id=>document.getElementById(id);
const esc=s=>String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const ago=ts=>{if(!ts)return'';const d=(Date.now()-ts)/1000;return d<60?'maintenant':d<3600?Math.floor(d/60)+'min':d<86400?Math.floor(d/3600)+'h':Math.floor(d/86400)+'j'};
const DEFAV='https://cdn.brawlify.com/brawler-bs/regular/16000000.png';
const LS='brawlnet_dm_v1';

let myId=null,myData=null;
let currentConvId=null,currentPeerId=null;
let msgListener=null,convListener=null,typingListener=null,presenceListener=null;
let pendingImg=null;
let typingTimer=null;
let allConvs={};

// ── TOAST ──────────────────────────────────────────────────
let toastT;
function toast(msg,type=''){
  const t=$('toast');t.textContent=msg;t.className='show'+(type?' '+type:'');
  clearTimeout(toastT);toastT=setTimeout(()=>t.className='',2600);
}

// ── SESSION ────────────────────────────────────────────────
const saveS=()=>{try{localStorage.setItem(LS,JSON.stringify({id:myId}));}catch(e){}};
const loadS=()=>{try{return JSON.parse(localStorage.getItem(LS));}catch(e){return null;}};
const clearS=()=>{try{localStorage.removeItem(LS);}catch(e){}};

// ── CONV ID (lexicographic sort pour unicité) ──────────────
function convId(a,b){return[a,b].sort().join('__')}

// ── AUTH TABS ──────────────────────────────────────────────
$('tab-login').onclick=()=>{
  ['tab-login','tab-signup'].forEach(id=>$(id).classList.remove('active'));
  ['form-login','form-signup'].forEach(id=>$(id).classList.remove('active'));
  $('tab-login').classList.add('active');$('form-login').classList.add('active');
};
$('tab-signup').onclick=()=>{
  ['tab-login','tab-signup'].forEach(id=>$(id).classList.remove('active'));
  ['form-login','form-signup'].forEach(id=>$(id).classList.remove('active'));
  $('tab-signup').classList.add('active');$('form-signup').classList.add('active');
};

// ── SIGNUP ─────────────────────────────────────────────────
$('btn-signup').onclick=async()=>{
  const name=$('su-name').value.trim().toLowerCase().replace(/\s+/g,'_');
  const fullname=$('su-fullname').value.trim();
  const pwd=$('su-pwd').value;
  $('signup-err').textContent='';
  if(!name||!fullname||!pwd){$('signup-err').textContent='Remplis tous les champs';return;}
  if(name.length<3){$('signup-err').textContent='Pseudo trop court';return;}
  $('btn-signup').disabled=true;$('btn-signup').textContent='Création...';
  try{
    // Check cross-DB: d'abord dans bwn (réseau social) pour l'avatar
    const bwnSnap=await get(ref(db,`bwn/users/${name}`));
    // Check bwndm
    const dmSnap=await get(ref(db,`${DB}/users/${name}`));
    if(dmSnap.exists()){$('signup-err').textContent='Pseudo déjà pris';return;}

    // Si compte existe sur le réseau social, on prend son avatar
    let avatar=DEFAV;
    if(bwnSnap.exists()&&bwnSnap.val().avatar) avatar=bwnSnap.val().avatar;

    const u={id:name,name,fullname,pwd:btoa(unescape(encodeURIComponent(pwd))),
      avatar,createdAt:Date.now()};
    await set(ref(db,`${DB}/users/${name}`),u);
    myId=name;myData=u;saveS();bootApp();
  }catch(e){$('signup-err').textContent='Erreur: '+e.message;}
  finally{$('btn-signup').disabled=false;$('btn-signup').textContent='Créer le compte';}
};

// ── LOGIN ──────────────────────────────────────────────────
async function doLogin(){
  const name=$('login-name').value.trim().toLowerCase().replace(/\s+/g,'_');
  const pwd=$('login-pwd').value;
  $('login-err').textContent='';
  if(!name||!pwd){$('login-err').textContent='Remplis tous les champs';return;}
  $('btn-login').disabled=true;$('btn-login').textContent='Connexion...';
  try{
    const snap=await get(ref(db,`${DB}/users/${name}`));
    if(!snap.exists()){$('login-err').textContent='Pseudo introuvable';return;}
    const u=snap.val();
    if(u.pwd!==btoa(unescape(encodeURIComponent(pwd)))){$('login-err').textContent='Mot de passe incorrect';return;}
    myId=name;myData=u;saveS();bootApp();
  }catch(e){$('login-err').textContent='Erreur de connexion';}
  finally{$('btn-login').disabled=false;$('btn-login').textContent='Se connecter';}
}
$('btn-login').onclick=doLogin;
$('login-pwd').onkeydown=e=>{if(e.key==='Enter')doLogin();};
$('msg-inp').onkeydown=e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}};

// ── BOOT ───────────────────────────────────────────────────
async function boot(){
  const s=loadS();
  if(s?.id){
    try{
      const snap=await get(ref(db,`${DB}/users/${s.id}`));
      if(snap.exists()){myId=s.id;myData=snap.val();bootApp();return;}
    }catch(e){}
    clearS();
  }
  $('auth').classList.add('on');
}
boot();

function bootApp(){
  $('auth').classList.remove('on');
  $('app').classList.add('on');
  $('my-av').src=myData.avatar||DEFAV;
  $('my-name').textContent=myData.fullname||myData.name;
  $('typing-av').src=myData.avatar||DEFAV;
  setPresence();
  listenConvs();
}

// ── LOGOUT ─────────────────────────────────────────────────
$('logout-btn').onclick=()=>{
  cleanupListeners();
  setOffline();
  myId=null;myData=null;clearS();
  $('app').classList.remove('on');
  $('auth').classList.add('on');
  currentConvId=null;currentPeerId=null;
  allConvs={};
};

// ── PRESENCE ───────────────────────────────────────────────
function setPresence(){
  if(!myId)return;
  const pRef=ref(db,`${DB}/presence/${myId}`);
  set(pRef,{online:true,last:Date.now()});
  onDisconnect(pRef).set({online:false,last:Date.now()});
}
function setOffline(){
  if(!myId)return;
  set(ref(db,`${DB}/presence/${myId}`),{online:false,last:Date.now()}).catch(()=>{});
}

// ── SEARCH USERS ───────────────────────────────────────────
let searchT;
$('search-inp').oninput=()=>{
  clearTimeout(searchT);
  const q=$('search-inp').value.trim().toLowerCase();
  if(!q){$('search-results').classList.remove('open');return;}
  searchT=setTimeout(()=>searchUsers(q),300);
};
$('search-inp').onblur=()=>setTimeout(()=>$('search-results').classList.remove('open'),200);

async function searchUsers(q){
  const snap=await get(ref(db,`${DB}/users`));
  const res=[];
  if(snap.exists()) snap.forEach(c=>{
    const u=c.val();
    if(u&&u.id!==myId&&(u.name.includes(q)||(u.fullname||'').toLowerCase().includes(q)))
      res.push(u);
  });
  // Also search bwn (réseau social users)
  const bwnSnap=await get(ref(db,`bwn/users`));
  if(bwnSnap.exists()) bwnSnap.forEach(c=>{
    const u=c.val();
    if(u&&u.id!==myId&&(u.name||'').includes(q)||(u.fullname||'').toLowerCase().includes(q)){
      if(!res.find(r=>r.id===u.id)) res.push({...u,fromBwn:true});
    }
  });
  if(!res.length){
    $('search-results').innerHTML='<div style="padding:12px 14px;color:var(--text2);font-size:.82rem;font-weight:700">Aucun résultat</div>';
    $('search-results').classList.add('open');return;
  }
  $('search-results').innerHTML=res.slice(0,6).map(u=>`
    <div class="search-item" data-uid="${esc(u.id)}">
      <img class="sav" src="${esc(u.avatar||DEFAV)}" onerror="this.src='${DEFAV}'" alt=""/>
      <div>
        <div class="sname">${esc(u.fullname||u.name)}</div>
        <div class="shandle">@${esc(u.id||u.name)}</div>
      </div>
    </div>`).join('');
  $('search-results').classList.add('open');
  $('search-results').querySelectorAll('.search-item').forEach(el=>
    el.onclick=async()=>{
      $('search-results').classList.remove('open');
      $('search-inp').value='';
      const uid=el.dataset.uid;
      // Si l'user est uniquement sur bwn, créer son profil dm
      const dSnap=await get(ref(db,`${DB}/users/${uid}`));
      if(!dSnap.exists()){
        const bSnap=await get(ref(db,`bwn/users/${uid}`));
        if(bSnap.exists()){
          const bu=bSnap.val();
          await set(ref(db,`${DB}/users/${uid}`),{
            id:uid,name:uid,fullname:bu.fullname||uid,
            avatar:bu.avatar||DEFAV,createdAt:Date.now(),pwd:'',ghost:true
          });
        }
      }
      openConv(uid);
    });
}

// ── LISTEN CONVS ───────────────────────────────────────────
function listenConvs(){
  if(convListener){off(ref(db,`${DB}/convs/${myId}`),'value',convListener);convListener=null;}
  convListener=onValue(ref(db,`${DB}/convs/${myId}`),async snap=>{
    if(!snap.exists()){
      $('conv-list').innerHTML=`<div class="conv-empty"><div class="ei">💬</div><p>Aucune conversation<br>Cherche un Brawler !</p></div>`;
      return;
    }
    const convs=[];
    snap.forEach(c=>{const v=c.val();if(v)convs.push({id:c.key,...v});});
    convs.sort((a,b)=>(b.lastAt||0)-(a.lastAt||0));
    allConvs={};

    // Fetch peer data for all convs
    const peers=await Promise.all(convs.map(async c=>{
      // peer id = the other uid
      const peerId=c.peerId;
      let peerData=null;
      const dSnap=await get(ref(db,`${DB}/users/${peerId}`));
      if(dSnap.exists())peerData=dSnap.val();
      else{
        const bSnap=await get(ref(db,`bwn/users/${peerId}`));
        if(bSnap.exists())peerData=bSnap.val();
      }
      return{...c,peerData};
    }));

    peers.forEach(c=>{allConvs[c.peerId]=c;});

    $('conv-list').innerHTML=peers.map(c=>{
      const u=c.peerData||{};
      const unread=c.unread||0;
      const isActive=c.peerId===currentPeerId;
      return `<div class="conv-item${isActive?' active':''}" data-peer="${esc(c.peerId)}">
        <img class="conv-av" src="${esc(u.avatar||DEFAV)}" onerror="this.src='${DEFAV}'" alt=""/>
        <div class="conv-info">
          <div class="conv-name">${esc(u.fullname||u.name||c.peerId)}</div>
          <div class="conv-last">${esc(c.lastMsg||'')}</div>
        </div>
        <div class="conv-meta">
          <div class="conv-time">${ago(c.lastAt)}</div>
          <div class="conv-badge${unread>0?' show':''}">${unread}</div>
        </div>
      </div>`;
    }).join('');
    $('conv-list').querySelectorAll('.conv-item').forEach(el=>
      el.onclick=()=>openConv(el.dataset.peer));
  });
}

// ── OPEN CONVERSATION ──────────────────────────────────────
async function openConv(peerId){
  if(currentPeerId===peerId)return;
  cleanupMsgListener();
  currentPeerId=peerId;
  currentConvId=convId(myId,peerId);

  // Mark read
  update(ref(db,`${DB}/convs/${myId}/${peerId}`),{unread:0}).catch(()=>{});

  // Load peer data
  let peerData=null;
  const dSnap=await get(ref(db,`${DB}/users/${peerId}`));
  if(dSnap.exists())peerData=dSnap.val();
  else{const bSnap=await get(ref(db,`bwn/users/${peerId}`));if(bSnap.exists())peerData=bSnap.val();}

  const pav=peerData?.avatar||DEFAV;
  const pname=peerData?.fullname||peerData?.name||peerId;
  $('ch-av').src=pav;
  $('ch-name').textContent=pname;
  $('ch-handle').textContent='@'+peerId;
  $('typing-av').src=pav;

  // Show chat
  $('chat-empty').style.display='none';
  $('chat-view').style.display='flex';

  // Mobile: hide sidebar
  if(window.innerWidth<=600) $('sidebar').classList.add('hidden');

  // Presence listener
  if(presenceListener){off(ref(db,`${DB}/presence/${peerId}`),'value',presenceListener);presenceListener=null;}
  presenceListener=onValue(ref(db,`${DB}/presence/${peerId}`),snap=>{
    const d=snap.val();
    $('online-dot').style.display=(d?.online)?'block':'none';
  });

  // Typing listener
  if(typingListener){off(ref(db,`${DB}/typing/${currentConvId}/${peerId}`),'value',typingListener);typingListener=null;}
  typingListener=onValue(ref(db,`${DB}/typing/${currentConvId}/${peerId}`),snap=>{
    const v=snap.val();
    const isTyping=v&&(Date.now()-(v.t||0))<4000;
    $('typing-ind').classList.toggle('show',!!isTyping);
  });

  // Messages listener
  $('messages').innerHTML=`<div style="padding:20px;text-align:center"><div class="skel" style="height:10px;width:40%;margin:0 auto 10px"></div><div class="skel" style="height:10px;width:60%;margin:0 auto"></div></div>`;
  msgListener=onValue(ref(db,`${DB}/msgs/${currentConvId}`),snap=>{
    const msgs=[];
    snap.forEach(c=>{const v=c.val();if(v)msgs.push({id:c.key,...v});});
    msgs.sort((a,b)=>(a.t||0)-(b.t||0));
    renderMessages(msgs,peerData);
    // scroll to bottom
    setTimeout(()=>{$('messages').scrollTop=$('messages').scrollHeight;},50);
  });

  // Update conv sidebar active state
  document.querySelectorAll('.conv-item').forEach(el=>{
    el.classList.toggle('active',el.dataset.peer===peerId);
  });
}

function cleanupMsgListener(){
  if(msgListener&&currentConvId){
    off(ref(db,`${DB}/msgs/${currentConvId}`),'value',msgListener);msgListener=null;
  }
  if(presenceListener&&currentPeerId){
    off(ref(db,`${DB}/presence/${currentPeerId}`),'value',presenceListener);presenceListener=null;
  }
  if(typingListener&&currentConvId&&currentPeerId){
    off(ref(db,`${DB}/typing/${currentConvId}/${currentPeerId}`),'value',typingListener);typingListener=null;
  }
}
function cleanupListeners(){
  cleanupMsgListener();
  if(convListener){off(ref(db,`${DB}/convs/${myId}`),'value',convListener);convListener=null;}
}

// ── RENDER MESSAGES ────────────────────────────────────────
function renderMessages(msgs,peerData){
  if(!msgs.length){
    $('messages').innerHTML=`<div style="text-align:center;padding:40px 20px;color:var(--text2)"><div style="font-size:2rem;margin-bottom:10px">👋</div><div style="font-weight:700;font-size:.88rem">Commence la conversation !</div></div>`;
    return;
  }
  let html='';
  let lastDate='';
  let lastSender='';
  let groupMsgs=[];

  const flushGroup=()=>{
    if(!groupMsgs.length)return;
    const isMe=groupMsgs[0].uid===myId;
    const av=isMe?(myData.avatar||DEFAV):(peerData?.avatar||DEFAV);
    html+=`<div class="msg-group ${isMe?'mine':'theirs'}">`;
    groupMsgs.forEach((m,i)=>{
      const isLast=i===groupMsgs.length-1;
      html+=`<div class="msg-row">
        <img class="msg-av-sm" src="${esc(av)}" onerror="this.src='${DEFAV}'" alt=""/>
        <div class="bubble">
          ${m.img?`<img class="bubble-img" src="${esc(m.img)}" alt="" data-full="${esc(m.img)}"/>`:''}
          ${m.text?esc(m.text):''}
        </div>
      </div>`;
      if(isLast) html+=`<div class="msg-time">${ago(m.t)}</div>`;
    });
    if(isMe&&groupMsgs[groupMsgs.length-1].read)
      html+=`<div class="read-tick">✓✓ Lu</div>`;
    html+='</div>';
    groupMsgs=[];
  };

  msgs.forEach(m=>{
    const d=new Date(m.t||0);
    const dateStr=d.toLocaleDateString('fr',{day:'numeric',month:'long'});
    if(dateStr!==lastDate){flushGroup();html+=`<div class="date-sep">${dateStr}</div>`;lastDate=dateStr;}
    if(m.uid!==lastSender){flushGroup();lastSender=m.uid;}
    groupMsgs.push(m);
  });
  flushGroup();

  $('messages').innerHTML=html;

  // Bind image click
  $('messages').querySelectorAll('.bubble-img').forEach(img=>
    img.onclick=()=>{$('img-modal-src').src=img.dataset.full;$('img-modal').classList.add('open');});
}

// ── SEND MESSAGE ───────────────────────────────────────────
async function sendMessage(){
  if(!currentPeerId||!myId)return;
  const text=$('msg-inp').value.trim();
  if(!text&&!pendingImg)return;

  $('send-btn').disabled=true;
  $('msg-inp').value='';
  autoResizeInp();

  const msgData={
    uid:myId,
    uname:myData.fullname||myData.name,
    av:myData.avatar||DEFAV,
    text:text||'',
    img:pendingImg||null,
    t:Date.now(),
    read:false
  };

  clearPendingImg();

  try{
    // Save message
    await push(ref(db,`${DB}/msgs/${currentConvId}`),msgData);

    const lastMsg=pendingImg?'📷 Image':(text.length>40?text.slice(0,40)+'…':text);

    // Update conv for both sides
    const convUpd={lastMsg,lastAt:Date.now()};
    await Promise.all([
      update(ref(db,`${DB}/convs/${myId}/${currentPeerId}`),{...convUpd,peerId:currentPeerId,unread:0}),
      // Increment unread for peer
      get(ref(db,`${DB}/convs/${currentPeerId}/${myId}/unread`)).then(s=>{
        const cur=s.val()||0;
        return update(ref(db,`${DB}/convs/${currentPeerId}/${myId}`),{...convUpd,peerId:myId,unread:cur+1});
      })
    ]);

    // Clear typing
    set(ref(db,`${DB}/typing/${currentConvId}/${myId}`),null).catch(()=>{});
  }catch(e){toast('Erreur envoi','err');}
  finally{$('send-btn').disabled=false;}
}

$('send-btn').onclick=sendMessage;

// ── TYPING INDICATOR ───────────────────────────────────────
$('msg-inp').oninput=()=>{
  autoResizeInp();
  if(!currentConvId||!myId)return;
  set(ref(db,`${DB}/typing/${currentConvId}/${myId}`),{t:Date.now()}).catch(()=>{});
  clearTimeout(typingTimer);
  typingTimer=setTimeout(()=>
    set(ref(db,`${DB}/typing/${currentConvId}/${myId}`),null).catch(()=>{}),3000);
};

function autoResizeInp(){
  const ta=$('msg-inp');
  ta.style.height='auto';
  ta.style.height=Math.min(ta.scrollHeight,120)+'px';
}

// ── IMAGE ATTACH ───────────────────────────────────────────
$('attach-btn').onclick=()=>$('file-inp').click();
$('file-inp').onchange=async e=>{
  const f=e.target.files[0];if(!f)return;
  toast('Compression...');
  const b64=await compress(f,800,.75);
  pendingImg=b64;
  $('preview-thumb').src=b64;
  $('preview-name').textContent=f.name;
  $('img-preview-bar').classList.add('show');
  $('file-inp').value='';
};
$('preview-rm').onclick=clearPendingImg;
function clearPendingImg(){
  pendingImg=null;
  $('img-preview-bar').classList.remove('show');
  $('preview-thumb').src='';
}

// ── BACK (mobile) ──────────────────────────────────────────
$('back-btn').onclick=()=>{
  $('sidebar').classList.remove('hidden');
  $('chat-empty').style.display='flex';
  $('chat-view').style.display='none';
  currentPeerId=null;currentConvId=null;
  cleanupMsgListener();
};

// ── FULLSCREEN IMAGE ───────────────────────────────────────
$('img-modal').onclick=()=>$('img-modal').classList.remove('open');

// ── COMPRESS ───────────────────────────────────────────────
function compress(file,maxW=800,q=.75){
  return new Promise(res=>{
    const url=URL.createObjectURL(file);
    const img=new Image();
    img.onload=()=>{
      let w=img.width,h=img.height;
      if(w>maxW){h=Math.round(h*maxW/w);w=maxW;}
      if(h>maxW){w=Math.round(w*maxW/h);h=maxW;}
      const canvas=document.createElement('canvas');
      canvas.width=w;canvas.height=h;
      const ctx=canvas.getContext('2d');
      ctx.fillStyle='#1c2128';ctx.fillRect(0,0,w,h);
      ctx.drawImage(img,0,0,w,h);
      URL.revokeObjectURL(url);
      res(canvas.toDataURL('image/jpeg',q));
    };
    img.onerror=()=>{URL.revokeObjectURL(url);res('');};
    img.src=url;
  });
}

// ── MARK MESSAGES AS READ ──────────────────────────────────
document.addEventListener('visibilitychange',()=>{
  if(!document.hidden&&currentConvId&&currentPeerId) markRead();
});
$('messages').addEventListener('click',()=>markRead());
async function markRead(){
  if(!currentConvId||!myId||!currentPeerId)return;
  update(ref(db,`${DB}/convs/${myId}/${currentPeerId}`),{unread:0}).catch(()=>{});
  // Mark all their messages as read
  const snap=await get(ref(db,`${DB}/msgs/${currentConvId}`));
  if(!snap.exists())return;
  const updates={};
  snap.forEach(c=>{const v=c.val();if(v&&v.uid===currentPeerId&&!v.read)updates[c.key+'/read']=true;});
  if(Object.keys(updates).length)
    update(ref(db,`${DB}/msgs/${currentConvId}`),updates).catch(()=>{});
}
</script>
